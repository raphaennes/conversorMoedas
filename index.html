<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-container">
        <h2>Conversor de Moedas </h2>
        
        <div class="input-group">
            <label for="usdValue">Valor em Dólar (USD):</label>
            <input type="number" id="usdValue" placeholder="Ex: 5.00" step="0.01">
        </div>

        <button id="convertBtn">Converter para Real</button>

        <div class="result-box">
            <p id="resultText">Digite um valor para converter</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
